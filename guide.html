<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Аудиогид</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="guide-style.css">
</head>
<body>
  <!-- Экран загрузки -->
  <div id="splashScreen" style="position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;color:#fff;">
    <div style="font-size:48px;margin-bottom:16px;">🎧</div>
    <h1 style="font-size:24px;margin:0 0 8px;">Аудиогид</h1>
    <p style="color:#94a3b8;margin:0;">Загрузка...</p>
  </div>

  <!-- Экран выбора маршрута -->
  <div id="routeSelect" style="display:none;min-height:100vh;background:#0f172a;color:#fff;padding:16px;">
    <div class="route-header" style="text-align:center;padding:20px 0;">
      <div class="route-icon" style="font-size:48px;margin-bottom:8px;">🗺️</div>
      <h2 style="margin:0 0 8px;">Доступные маршруты</h2>
      <p style="color:#94a3b8;margin:0;">Выберите маршрут для начала экскурсии</p>
    </div>
    <div id="route-list" style="max-width:400px;margin:0 auto;"></div>
  </div>

  <!-- Экран гида -->
  <div id="guideScreen" style="display:none;min-height:100vh;background:#0f172a;color:#fff;">
    <div style="padding:16px;max-width:500px;margin:0 auto;">
      <!-- Шапка -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <button onclick="showRouteSelect()" style="background:#334155;border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;">← Маршруты</button>
        <span id="routeName" style="color:#94a3b8;font-size:14px;"></span>
      </div>

      <!-- Прогресс маршрута -->
      <div style="background:#1e293b;border-radius:12px;padding:12px;margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;color:#94a3b8;">
          <span>Прогресс маршрута</span>
          <span id="routeProgressText">0%</span>
        </div>
        <div style="background:#334155;border-radius:4px;height:6px;overflow:hidden;">
          <div id="routeProgress" style="background:#3b82f6;height:100%;width:0%;transition:width 0.3s;"></div>
        </div>
      </div>

      <!-- Карточка точки -->
      <div style="background:#1e293b;border-radius:16px;overflow:hidden;margin-bottom:16px;border:1px solid #334155;">
        <img id="pointImage" src="" alt="" style="width:100%;height:200px;object-fit:cover;display:none;">
        <div style="padding:16px;">
          <h1 id="pointTitle" style="margin:0 0 8px;font-size:20px;">Точка</h1>
          <p id="pointDescription" style="color:#94a3b8;margin:0 0 16px;line-height:1.5;">Описание точки</p>

          <!-- Статистика -->
          <div style="display:flex;gap:12px;margin-bottom:16px;">
            <div style="background:#0f172a;padding:8px 12px;border-radius:8px;text-align:center;flex:1;">
              <div style="font-size:18px;">📏</div>
              <div id="distanceValue" style="font-size:14px;font-weight:bold;">0 м</div>
              <div style="font-size:11px;color:#64748b;">До следующей</div>
            </div>
            <div style="background:#0f172a;padding:8px 12px;border-radius:8px;text-align:center;flex:1;">
              <div style="font-size:18px;">👟</div>
              <div id="stepsValue" style="font-size:14px;font-weight:bold;">0</div>
              <div style="font-size:11px;color:#64748b;">Шагов</div>
            </div>
            <div style="background:#0f172a;padding:8px 12px;border-radius:8px;text-align:center;flex:1;">
              <div style="font-size:18px;">🔥</div>
              <div id="caloriesValue" style="font-size:14px;font-weight:bold;">0</div>
              <div style="font-size:11px;color:#64748b;">Ккал</div>
            </div>
          </div>

          <!-- Аудиоплеер -->
          <div style="background:#0f172a;border-radius:12px;padding:12px;">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
              <button id="playPauseBtn" onclick="togglePlay()" style="background:#3b82f6;border:none;color:#fff;width:48px;height:48px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;">▶️</button>
              <div style="flex:1;">
                <div id="audioDuration" style="font-size:13px;color:#94a3b8;">0:00</div>
              </div>
            </div>
            <div id="audioProgressBar" style="background:#334155;border-radius:4px;height:6px;cursor:pointer;margin-bottom:4px;">
              <div id="audioProgressFill" style="background:#3b82f6;height:100%;width:0%;border-radius:4px;transition:width 0.1s;"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;">
              <span id="audioCurrent">0:00</span>
              <span id="audioTotal">0:00</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Кнопки навигации -->
      <div style="display:flex;gap:12px;margin-bottom:16px;">
        <button onclick="prevPoint()" style="flex:1;background:#334155;border:none;color:#fff;padding:14px;border-radius:12px;font-size:16px;cursor:pointer;">← Назад</button>
        <button onclick="showMap()" style="flex:1;background:#334155;border:none;color:#fff;padding:14px;border-radius:12px;font-size:16px;cursor:pointer;">🗺️ Карта</button>
        <button onclick="nextPoint()" style="flex:1;background:#3b82f6;border:none;color:#fff;padding:14px;border-radius:12px;font-size:16px;cursor:pointer;">Далее →</button>
      </div>

      <!-- QR сканер -->
      <button onclick="scanQR()" style="width:100%;background:#10b981;border:none;color:#fff;padding:14px;border-radius:12px;font-size:16px;cursor:pointer;margin-bottom:16px;">
        📷 Сканировать QR-код
      </button>
    </div>
  </div>

  <!-- Экран карты -->
  <div id="mapScreen" style="display:none;position:fixed;inset:0;background:#0f172a;z-index:1000;">
    <div style="position:absolute;top:0;left:0;right:0;z-index:1001;padding:16px;display:flex;justify-content:space-between;align-items:center;">
      <button onclick="showGuideFromMap()" style="background:rgba(30,41,59,0.9);border:none;color:#fff;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:14px;">← Назад к гиду</button>
      <button onclick="showRouteToNext()" style="background:rgba(59,130,246,0.9);border:none;color:#fff;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:14px;">🧭 Маршрут</button>
    </div>
    <div id="mapContainer" style="width:100%;height:100%;"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="guide-app.js"></script>
</body>
</html>
