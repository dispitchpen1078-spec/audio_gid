<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Аудиогид</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="guide-style.css">
<meta name="theme-color" content="#1e3a8a">
<link rel="manifest" href="manifest.json">
</head>
<body>
<div id="app">
  <!-- Экран загрузки -->
  <div class="splash-screen" id="splash">
    <div class="splash-content">
      <div class="splash-icon">🏛️</div>
      <h1>Аудиогид</h1>
      <p>Загрузка...</p>
      <div class="loading-spinner"></div>
    </div>
  </div>

  <!-- Экран выбора маршрута -->
  <div class="route-select-screen" id="routeSelect" style="display:none">
    <div class="route-select-content">
      <div class="route-header">
        <div class="route-icon">🗺️</div>
        <h2>Выберите маршрут</h2>
        <p>Или отсканируйте QR-код у первой точки</p>
      </div>
      <div id="route-list" class="route-list"></div>
    </div>
  </div>

  <!-- Главный экран гида -->
  <div class="guide-screen" id="guideScreen" style="display:none">
    <!-- Шапка -->
    <div class="guide-header">
      <button class="back-btn" id="backBtn" onclick="showMap()">🗺️ Карта</button>
      <div class="route-badge" id="routeBadge">Маршрут</div>
      <div class="point-counter" id="pointCounter">1 / 5</div>
    </div>

    <!-- Карточка точки -->
    <div class="point-card" id="pointCard">
      <div class="point-image-wrap">
        <img id="pointImage" src="" alt="">
        <div class="point-icon-overlay" id="pointIcon">📍</div>
        <div class="point-number" id="pointNumber">1</div>
      </div>
      <div class="point-info">
        <h2 id="pointTitle">Название точки</h2>
        <p id="pointDesc">Описание точки...</p>
      </div>
    </div>

    <!-- Статистика маршрута -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-item">
        <span class="stat-icon">👣</span>
        <span class="stat-value" id="statSteps">0</span>
        <span class="stat-label">шагов</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">📏</span>
        <span class="stat-value" id="statMeters">0</span>
        <span class="stat-label">метров</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">🔥</span>
        <span class="stat-value" id="statCalories">0</span>
        <span class="stat-label">ккал</span>
      </div>
    </div>

    <!-- Аудиоплеер -->
    <div class="audio-player" id="audioPlayer">
      <div class="audio-progress-wrap">
        <div class="audio-progress-bar" id="audioProgressBar">
          <div class="audio-progress-fill" id="audioProgressFill"></div>
        </div>
        <div class="audio-time">
          <span id="audioCurrent">0:00</span>
          <span id="audioDuration">0:00</span>
        </div>
      </div>
      <div class="audio-controls">
        <button class="audio-btn rewind" id="rewindBtn" onclick="seekAudio(-10)">⏪</button>
        <button class="audio-btn play-pause" id="playPauseBtn" onclick="togglePlay()">▶️</button>
        <button class="audio-btn forward" id="forwardBtn" onclick="seekAudio(10)">⏩</button>
      </div>
      <div class="audio-speed">
        <button class="speed-btn" data-speed="0.8" onclick="setSpeed(0.8)">0.8x</button>
        <button class="speed-btn active" data-speed="1" onclick="setSpeed(1)">1x</button>
        <button class="speed-btn" data-speed="1.5" onclick="setSpeed(1.5)">1.5x</button>
        <button class="speed-btn" data-speed="2" onclick="setSpeed(2)">2x</button>
      </div>
    </div>

    <!-- Кнопка следующей точки -->
    <div class="next-point-section" id="nextPointSection">
      <div class="next-point-info" id="nextPointInfo">
        <span>📍 Следующая: </span>
        <strong id="nextPointName">—</strong>
      </div>
      <button class="next-point-btn" id="nextPointBtn" onclick="showRouteToNext()">
        <span>🗺️ Показать путь</span>
        <small id="nextPointDistance">0 м</small>
      </button>
    </div>

    <!-- Кнопка сканирования QR — ВАЖНО: id="qrScanBtn" -->
    <div class="qr-scan-section" id="qrScanSection">
      <div class="qr-divider">
        <span>или</span>
      </div>
      <button class="qr-scan-btn" id="qrScanBtn" onclick="scanQR()">
        <span>📷 Сканировать QR-код</span>
        <small>следующей точки</small>
      </button>
    </div>
    
    <div style="height: 40px; flex-shrink: 0;"></div>
  </div>

  <!-- Экран карты с маршрутом -->
  <div class="map-screen" id="mapScreen" style="display:none">
    <div class="map-header">
      <button class="map-back-btn" onclick="showGuideFromMap()">← Назад</button>
      <div class="map-title" id="mapTitle">Маршрут</div>
    </div>
    <div id="map"></div>
    <div class="map-footer">
      <div class="map-instruction" id="mapInstruction">
        Идите по зелёной линии к следующей точке
      </div>
      <button class="arrived-btn" id="arrivedBtn" onclick="onArrived()">
        📷 Сканировать QR
      </button>
    </div>
  </div>

  <!-- Тост -->
  <div class="toast" id="toast"></div>
</div>

<script src="guide-app.js"></script>
</body>
</html>
